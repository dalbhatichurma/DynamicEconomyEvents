name: DynamicEconomyEvents
version: 1.0.0
main: com.dynamiceconomy.DynamicEconomyEvents
api-version: '1.21'
author: MathTeacher
description: Live economy system with random global events
softdepend: [Vault]

commands:
  economyevent:
    description: Manage economy events
    usage: /economyevent <start|stop|status|reload>
    aliases: [ee, ecevent]
    permission: economyevent.admin

permissions:
  economyevent.admin:
    description: Access to all economy event commands
    default: op
  economyevent.notify:
    description: Receive economy event notifications
    default: true
  economyevent.bypass.tax:
    description: Bypass tax during Tax Event
    default: false
